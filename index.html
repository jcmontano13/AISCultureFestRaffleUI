<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AIS Culture Fest - Grand Raffle Draw</title>
  <style>
    body {
      background: linear-gradient(135deg, #d32f2f 0%, #e65100 60%, #f57c00 100%);
      color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      position: relative;
    }
    
    .btn-settings {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: #fff8e1;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
      backdrop-filter: blur(5px);
    }
    .btn-settings:hover {
      background: rgba(255, 255, 255, 0.25);
      border-color: #ffffff;
    }

    h1 { 
      font-size: 3.2rem; 
      margin-bottom: 5px; 
      letter-spacing: 2px; 
      text-transform: uppercase;
      text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      color: #ffffff;
    }
    
    .status { 
      color: #fff8e1; 
      font-size: 1.2rem; 
      margin-bottom: 35px; 
      min-height: 30px; 
      font-weight: 600;
      letter-spacing: 1px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }
    
    /* 8 Digit Display Container */
    .digit-container {
      display: flex;
      gap: 15px;
      margin-bottom: 40px;
    }
    
    .digit-box {
      width: 75px;
      height: 110px;
      background: #fff8e1;
      border: 4px solid #fbc02d;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.8rem;
      font-weight: bold;
      color: #b71c1c;
      box-shadow: 0 12px 25px rgba(0,0,0,0.25);
      transition: transform 0.2s, background-color 0.3s, border-color 0.3s;
    }
    
    .digit-box.active {
      animation: pulse 0.1s infinite;
      background: #ffffff;
      border-color: #ff9800;
    }

    .digit-box.revealed {
      background: #15803d;
      border-color: #fbc02d;
      color: #ffffff;
      transform: scale(1.08);
      box-shadow: 0 0 30px rgba(251, 192, 45, 0.6);
    }

    @keyframes pulse {
      0% { transform: translateY(-2px); }
      50% { transform: translateY(2px); }
      100% { transform: translateY(-2px); }
    }

    .btn-draw {
      background: #fbc02d;
      color: #b71c1c;
      border: none;
      padding: 18px 55px;
      font-size: 1.7rem;
      font-weight: 800;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 1px;
    }

    .btn-draw:hover { background: #fdd835; transform: scale(1.03); }
    .btn-draw:disabled { background: #e0e0e0; color: #9e9e9e; cursor: not-allowed; transform: none; box-shadow: none; }

    /* Modal Overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(183, 28, 28, 0.85);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-box {
      background: #fff8e1;
      padding: 30px;
      border-radius: 16px;
      width: 90%;
      max-width: 500px;
      border: 3px solid #fbc02d;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
      gap: 15px;
      color: #333;
    }

    .modal-box h2 { margin: 0; font-size: 1.5rem; color: #b71c1c; }
    .modal-box p { margin: 0; font-size: 0.95rem; color: #555; }
    .modal-status { color: #2e7d32; font-size: 0.9rem; font-weight: bold; }

    textarea {
      width: 100%;
      height: 180px;
      background: #ffffff;
      border: 2px solid #ffb74d;
      color: #b71c1c;
      font-family: monospace;
      font-size: 1.1rem;
      padding: 12px;
      border-radius: 8px;
      resize: vertical;
      box-sizing: border-box;
    }

    textarea:focus { outline: none; border-color: #e65100; }

    .modal-buttons {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .btn-save { background: #2e7d32; color: white; padding: 10px 20px; font-size: 1rem; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .btn-save:hover { background: #1b5e20; }
    .btn-cancel { background: #757575; color: white; padding: 10px 16px; font-size: 1rem; border: none; border-radius: 6px; cursor: pointer; }
    .btn-reset { background: #c62828; color: white; padding: 10px 16px; font-size: 0.9rem; border: none; border-radius: 6px; cursor: pointer; }
    .btn-reset:hover { background: #8e0000; }
  </style>
</head>
<body>

  <button class="btn-settings" id="setupBtn" onclick="openModal()" title="Load Entries">⚙️ Setup Entries</button>

  <h1>🎉 CULTURE FEST RAFFLE 🎉</h1>
  <div class="status" id="statusText">Ready to Draw</div>

  <div class="digit-container">
    <div class="digit-box" id="d0">?</div>
    <div class="digit-box" id="d1">?</div>
    <div class="digit-box" id="d2">?</div>
    <div class="digit-box" id="d3">?</div>
    <div class="digit-box" id="d4">?</div>
    <div class="digit-box" id="d5">?</div>
    <div class="digit-box" id="d6">?</div>
    <div class="digit-box" id="d7">?</div>
  </div>

  <button class="btn-draw" id="drawBtn" onclick="startDraw()" disabled>DRAW WINNER</button>

  <!-- Modal Popup for Textarea -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <h2>Paste Google Sheet Entries</h2>
      <p>Paste the <b>Register Number</b> column below. Duplicates will automatically be removed.</p>
      <textarea id="rawInput" placeholder="12345678&#10;87654321&#10;..."></textarea>
      <div class="modal-status" id="modalStatus"></div>
      <div class="modal-buttons">
        <button class="btn-reset" onclick="clearStorage()" title="Clear cached data">🗑️ Clear Cache</button>
        <div>
          <button class="btn-cancel" onclick="closeModal()">Cancel</button>
          <button class="btn-save" onclick="saveEntries()">Deduplicate & Save</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let participants = [];

    // Auto-restore saved participants from local temporary storage on page load
    window.onload = () => {
      const savedData = localStorage.getItem('ais_raffle_participants');
      if (savedData) {
        try {
          participants = JSON.parse(savedData);
          if (participants.length > 0) {
            document.getElementById('setupBtn').innerText = `⚙️ Setup Entries (${participants.length})`;
            document.getElementById('statusText').innerText = `Ready to Draw`;
            document.getElementById('drawBtn').disabled = false;
            document.getElementById('modalStatus').innerText = `ℹ️ Restored ${participants.length} remaining entries from previous session.`;
          }
        } catch (e) {
          console.error("Error loading cached storage", e);
        }
      }
    };

    function openModal() {
      document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modalOverlay').style.display = 'none';
    }

    function saveEntries() {
      const rawText = document.getElementById('rawInput').value;
      
      const extractedNumbers = rawText
        .split(/[\n,,\t\s]+/)
        .map(str => str.trim())
        .filter(num => /^\d{8}$/.test(num));

      const uniqueNumbers = [...new Set(extractedNumbers)];

      if (uniqueNumbers.length > 0) {
        participants = uniqueNumbers;
        const dupesRemoved = extractedNumbers.length - uniqueNumbers.length;
        
        // Save to browser temporary cache
        localStorage.setItem('ais_raffle_participants', JSON.stringify(participants));

        document.getElementById('modalStatus').innerText = 
          `✅ Saved ${participants.length} unique entries (${dupesRemoved} duplicates removed).`;
        
        document.getElementById('setupBtn').innerText = `⚙️ Setup Entries (${participants.length})`;
        document.getElementById('statusText').innerText = `Ready to Draw`;
        document.getElementById('drawBtn').disabled = false;
        
        setTimeout(closeModal, 600);
      } else {
        alert("No valid 8-digit numbers found. Please check your pasted text!");
      }
    }

    function clearStorage() {
      if (confirm("Are you sure you want to clear all loaded entries and start fresh?")) {
        localStorage.removeItem('ais_raffle_participants');
        participants = [];
        document.getElementById('rawInput').value = '';
        document.getElementById('setupBtn').innerText = `⚙️ Setup Entries`;
        document.getElementById('statusText').innerText = `Please load entries in settings`;
        document.getElementById('modalStatus').innerText = `Cleared cached storage!`;
        document.getElementById('drawBtn').disabled = true;
      }
    }

    async function startDraw() {
      if (participants.length === 0) return;

      const btn = document.getElementById('drawBtn');
      btn.disabled = true;
      document.getElementById('statusText').innerText = "Drawing Winner...";

      // Reset digit boxes
      for (let i = 0; i < 8; i++) {
        const box = document.getElementById(`d${i}`);
        box.innerText = '?';
        box.className = 'digit-box';
      }

      const winningIndex = Math.floor(Math.random() * participants.length);
      const winnerNumber = participants[winningIndex];

      // Remove winner from pool
      participants.splice(winningIndex, 1);

      // Update browser temporary cache instantly
      localStorage.setItem('ais_raffle_participants', JSON.stringify(participants));

      // Update subtle counter
      document.getElementById('setupBtn').innerText = `⚙️ Setup Entries (${participants.length})`;

      // Reveal digits one by one with progressive suspense timing
      for (let i = 0; i < 8; i++) {
        let speed = 70;    // Standard speed (1-6)
        let maxSpins = 15;

        if (i === 6) {     // 7th Digit (Slower)
          speed = 120;
          maxSpins = 22;
        } 
        else if (i === 7) { // 8th Digit (Slowest reveal)
          speed = 180;
          maxSpins = 30;
        }

        await revealDigit(i, winnerNumber[i], speed, maxSpins);
      }

      document.getElementById('statusText').innerText = `🏆 WINNER DRAWN: ${winnerNumber}`;
      
      if (participants.length > 0) {
        btn.disabled = false;
      } else {
        document.getElementById('statusText').innerText = `🏆 WINNER: ${winnerNumber} (All entries drawn!)`;
      }
    }

    function revealDigit(index, targetDigit, speed, maxSpins) {
      return new Promise((resolve) => {
        const box = document.getElementById(`d${index}`);
        box.classList.add('active');

        let spins = 0;
        
        const interval = setInterval(() => {
          box.innerText = Math.floor(Math.random() * 10);
          spins++;

          if (spins >= maxSpins) {
            clearInterval(interval);
            box.innerText = targetDigit;
            box.classList.remove('active');
            box.classList.add('revealed');
            resolve();
          }
        }, speed);
      });
    }
  </script>
</body>
</html>
